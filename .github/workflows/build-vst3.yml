name: Build TB-303 VSTi (VST3)

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-vst3:
    name: Build VST3 (Windows / MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4

      - name: Clone JUCE 8.0.14 (the framework is not vendored in git)
        run: |
          git clone --depth 1 --branch 8.0.14 https://github.com/juce-framework/JUCE.git JUCE

      - name: Set up MSVC (cl.exe) + Ninja environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure + Build VST3 (Ninja, MSVC x64)
        shell: cmd
        run: |
          cmake -B build -S . -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_RC_COMPILER=rc ^
            -DJUCE_DIR="%GITHUB_WORKSPACE%/JUCE" || exit /b 1
          cmake --build build --config Release --target TB303VSTi_VST3 || exit /b 1

      - name: Locate built .vst3
        id: vst3
        shell: bash
        run: |
          f=$(find build -name "TB-303 VSTi.vst3" -type d | head -1)
          echo "path=$f" >> "$GITHUB_OUTPUT"
          echo "Built: $f"

      - name: Upload VST3 as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TB-303-VSTi-vst3
          path: ${{ steps.vst3.outputs.path }}
          if-no-files-found: error

      - name: Publish to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vst3.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
